<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smurfer - 420</title>
  </head>
  <body>
    <video autoplay muted loop id="bg_anim">
      <source src="assets/bg_anim.mp4" type="video/mp4" />
    </video>
    <div class="center-box" role="region" aria-label="Central content box">
      <img
        style="border-radius: 50%"
        src="assets/pfp.png"
        alt="Smurfer PFP"
        width="125px"
      />
      <p style="color: black" class="glow1">Smurfer</p>
      <p style="color: black" class="glow2">
        Hello there, my name is Smurfer, and i am a developer, minecraft server
        creator, and moderator. if you want to find more about me, check out
        <a href="https://smurfer420.github.io/Me">This link</a>
      </p>
      <div class="copy-wrapper">
        <img
          class="discord_copy"
          src="assets/discord.png"
          alt="discord logo"
          width="75"
          style="margin-bottom: -50px"
          onclick="_copyText()"
        />
        <div id="copy-popup" class="copy-popup glow2">Copied Discord User!</div>
      </div>
    </div>
    <!--    <p style="color: black" class="glow2">
      ToDo: Make it animated. add discord, and staffing experience
    </p>-->
  </body>
</html>
